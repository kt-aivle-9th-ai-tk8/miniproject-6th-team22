# 아래의 .env 내용들은 로컬개발에서는 .env(또는 application-local.yaml), k8s 환경에서는 ConfigMap/Secret 으로 주입되는것임을 참고

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

spring:
  application:
    name: bookapp

  datasource:
    # h2
    #driver-class-name: org.h2.Driver
    #url: jdbc:h2:mem:bookdb
    #username: sa
    #password: 1234

    # mysql (rds)
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update # create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  servlet:
    context-path: /api