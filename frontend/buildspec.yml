version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20

  pre_build:
    commands:
      - echo "API base is $VITE_API_BASE_URL"
      - cd frontend
      - npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - aws s3 sync ./dist s3://aivle22-website --delete
      - aws cloudfront create-invalidation --distribution-id E2633XN9AUHA1I --paths "/*"